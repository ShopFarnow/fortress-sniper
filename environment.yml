name: sniper-v4

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  UNIFIED HALAL SNIPER v4.4-OPT — Conda Environment Specification        ║
# ║                                                                          ║
# ║  SETUP (3 commands):                                                     ║
# ║    conda env create -f sniper_v4_4_OPT_environment.yml                  ║
# ║    conda activate sniper-v4                                              ║
# ║    python sniper_unified_v4_4_OPT.py                                    ║
# ║                                                                          ║
# ║  Python 3.11 recommended (fastest CPython, best asyncio).               ║
# ║  Python 3.10 / 3.12 also work.                                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

channels:
  - conda-forge
  - defaults

dependencies:
  # Runtime
  - python=3.11

  # Core scientific stack (conda binaries for performance)
  - numpy>=1.26,<2.0
  # OPT-1/2/3/4: numpy <2.0 required — numpy 2.x has breaking API changes
  - pandas>=2.1,<3.0
  # Pandas 2.x CoW semantics required throughout scoring engine
  - scipy>=1.11
  # OPT-3: scipy.signal.argrelextrema for VCP pivot detection
  # Falls back gracefully to Python loop if scipy absent

  # HTTP
  - requests>=2.31
  - urllib3>=2.0

  # Machine learning — meta-labeler + Platt calibration
  - scikit-learn>=1.4

  # pip section — packages not cleanly available on conda-forge
  - pip

  - pip:
    # Market data
    - yfinance>=0.2.38
    # OPT-16: batch preload requires group_by="ticker" (0.2.38+)
    - multitasking>=0.0.11

    # Google Sheets integration
    - gspread>=6.0.0
    - google-auth>=2.27
    - google-auth-oauthlib>=1.2

    # Telegram bot (v20+ async API)
    - python-telegram-bot>=20.7

    # Excel report output
    - openpyxl>=3.1.2
    - xlsxwriter>=3.1.9

    # Optional: NSE jugaad-data proxy fallback
    # Uncomment if NSE frequently blocks your server IP:
    # - jugaad-data>=0.28

# ══════════════════════════════════════════════════════════════════════════
# ENVIRONMENT VARIABLES
# ══════════════════════════════════════════════════════════════════════════
# Copy to a .env file or export before running.
#
# REQUIRED:
#   TELEGRAM_TOKEN        = <bot_token>        # 1234567890:AABBccDDeeFFgg...
#   TELEGRAM_CHAT_ID      = <chat_id>          # Your personal or group chat ID
#   ANTHROPIC_API_KEY     = sk-ant-...         # Claude API (LLM screening + story)
#
# OPTIONAL (improves accuracy):
#   OPENAI_API_KEY        = sk-...             # GPT-4o-mini filing sentiment fallback
#   GOOGLE_SHEET_ID       = <sheet_id>         # Sheets: INSIDER/FILINGS/FII_DII tabs
#   GOOGLE_CREDS_JSON     = <base64_json>      # Service account JSON, base64-encoded
#   TELEGRAM_SHARE_IDS    = <id1>,<id2>        # Additional Telegram chat IDs
#
# CAPITAL & RISK:
#   ACCOUNT_EQUITY        = 500000             # Capital in INR (default Rs 5 lakh)
#   ACCOUNT_RISK_PCT      = 0.015              # Risk per trade as decimal (1.5%)
#   APEX_MIN_SCORE        = 48                 # Min fused score to emit a pick
#   APEX_TOP_N            = 5                  # Max picks per run
#   MC_SIMS               = 600                # Monte Carlo simulations (min 100)
#   SHARIAH_CACHE_TTL_DAYS= 7                  # Days before re-fetching Shariah CSV
#   CAPACITY_MAX_OPEN     = 4                  # Max concurrent open positions
#   CAPACITY_MAX_WEEK     = 6                  # Max new picks per week
#
# RUN MODES:
#   PAPER_MODE            = true               # Shadow mode — no real alerts
#   FORCE_YFINANCE        = true               # Skip NSE, always use yfinance
#   FORCE_SHEETS          = true               # Force Sheets as bhavcopy source
#   CB_FAIL_SAFE          = true               # Block entries if CB data unavailable
#   NSE_PROXY_ENABLED     = true               # Enable residential proxy for NSE
#   NSE_PROXY_URL         = http://user:pass@host:port
#   SUPPRESS_HEALTH_ALERTS= true               # Mute Telegram health alerts
#
# PATHS & MODELS:
#   CACHE_PATH            = outputs/sniper_cache.db
#   CLAUDE_MODEL          = claude-sonnet-4-5
#   OPENAI_MINI_MODEL     = gpt-4o-mini
#   LLM_MAX_TOKENS        = 512
#   HALAL_AI_TTL_DAYS     = 7
#   EVENT_QUEUE_MAX_SIZE  = 500
#   NSE_MAX_RETRIES       = 3
