name: "UNIFIED HALAL SNIPER v5.5.3"

on:
  schedule:
    # FIX: Moved to 2:00 AM UTC (7:30 AM IST). Guarantees Job 1 finishes BEFORE Job 2 starts.
    - cron: "0 2 * * 1-5"
    # Job 2: Reply handler poll starts at 3:00 AM UTC (8:30 AM IST) - Zero overlap.
    - cron: "*/10 3-10 * * 1-5"
    # Job 3: Outcome engine — 10:00 AM UTC (3:30 PM IST)
    - cron: "0 10 * * 1-5"
    # Job 4: Weekly review — Monday 2:45 AM UTC (8:15 AM IST)
    - cron: "45 2 * * 1"

  workflow_dispatch:
    inputs:
      fast_rerun:
        description: "Fast rerun (use score cache)"
        required: false
        default: "false"
        type: boolean

env:
  NSE_MAX_RETRIES:        "1"
  SUPPRESS_HEALTH_ALERTS: "1"
  REPLY_TIMEOUT_MINUTES:  "30"
  APEX_MIN_SCORE:         "40"
  MC_SIMS:                "600"

jobs:

  sniper-run:
    name: "⚔️ Sniper Daily Run"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}
          restore-keys: |
            sniper-db-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Run Sniper Engine
        run: python sniper_unified_v5_5.py
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db
          ACCOUNT_EQUITY:    ${{ secrets.ACCOUNT_EQUITY || '500000' }}
          ACCOUNT_RISK_PCT:  ${{ secrets.ACCOUNT_RISK_PCT || '0.015' }}
          FAST_RERUN:        ${{ inputs.fast_rerun || 'false' }}
          CONVICTION_RERANK: "true"
          # FIX: Bypasses the bug that forcibly downgraded APEX picks to GOOD
          CONV_REQUIRE_CATALYST: "false"

      - name: Save DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}-${{ github.run_attempt }}

  reply-handler:
    name: "📱 Reply Handler"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '*/10 3-10 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}
          restore-keys: |
            sniper-db-

      - name: Restore offset
        uses: actions/cache/restore@v4
        with:
          path: tg_offset.txt
          key: tg-offset-${{ github.run_id }}
          restore-keys: |
            tg-offset-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Poll Telegram
        run: python reply_handler_v5_5.py
        env:
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          CACHE_PATH:            outputs/sniper_cache.db
          GOOGLE_SHEET_ID:       ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON:     ${{ secrets.GOOGLE_CREDS_JSON }}

      - name: Backup decisions to Sheets
        if: always()
        run: |
          python - <<'EOF'
          try:
              from sniper_unified_v5_5 import _init_db, _backup_db_to_sheets
              _init_db()
              _backup_db_to_sheets()
          except Exception as e:
              pass
          EOF
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db

      - name: Save offset
        if: always()
        uses: actions/cache/save@v4
        with:
          path: tg_offset.txt
          key: tg-offset-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}-${{ github.run_attempt }}

  outcome-check:
    name: "📊 Outcome Engine"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1-5') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}
          restore-keys: |
            sniper-db-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Run outcome engine
        run: |
          python - <<'EOF'
          from sniper_unified_v5_5 import (
              _init_db, _restore_db_from_sheets, _backup_db_to_sheets,
              _run_outcome_engine, _auto_log_skipped_picks, _get_last_trading_day,
          )
          _init_db()
          _restore_db_from_sheets()
          _, date_label = _get_last_trading_day()
          _run_outcome_engine()
          _auto_log_skipped_picks(date_label)
          _backup_db_to_sheets()
          EOF
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db

      - name: Save DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}-${{ github.run_attempt }}

  weekly-review:
    name: "📈 Weekly Review"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '45 2 * * 1') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}
          restore-keys: |
            sniper-db-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Run weekly review
        run: python sniper_unified_v5_5.py --weekly-review
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db

      - name: Save DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}-${{ github.run_attempt }}
