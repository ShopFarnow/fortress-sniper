name: "FORTRESS SNIPER v6.0 EOD QUANTUM"

# ─────────────────────────────────────────────────────────────────────────────
# v6.0 SCHEDULE — ZERO INFRASTRUCTURE STACK
#
#   Job 1: EOD Screener    — 3:00 AM UTC (8:30 AM IST open)
#   Job 2: Reply Handler   — every 10 min during market hours
#   Job 3: Outcome Engine  — 10:00 AM UTC (3:30 PM IST close)
#   Job 4: Weekly Review   — Monday 2:45 AM UTC (8:15 AM IST)
#
# DB: Google Sheets (persistent, zero-cost, race-condition-proof)
# SQLite: ephemeral score/LLM cache only (disposable on runner reset)
# Execution: Manual via broker — Telegram is alerting only (Phase 5 deferred)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Job 1: Main screener — 8:30 AM IST = 3:00 AM UTC
    - cron: "0 3 * * 1-5"
    # Job 2: Reply handler — every 10 min, 8:30 AM–4 PM IST = 3:00–10:30 AM UTC
    - cron: "*/10 3-10 * * 1-5"
    # Job 3: Outcome engine — 3:30 PM IST = 10:00 AM UTC
    - cron: "0 10 * * 1-5"
    # Job 4: Weekly review — Monday 8:15 AM IST = 2:45 AM UTC
    - cron: "45 2 * * 1"

  workflow_dispatch:
    inputs:
      fast_rerun:
        description: "Fast rerun (score cache)"
        required: false
        default: "false"
        type: boolean
      force_weekly:
        description: "Force weekly review"
        required: false
        default: "false"
        type: boolean
      outcome_only:
        description: "Outcome engine only"
        required: false
        default: "false"
        type: boolean

env:
  # ── LLM ──────────────────────────────────────────────────────────────────
  OPENAI_MINI_MODEL:    "gpt-4o-mini"
  OPENAI_EMBED_MODEL:   "text-embedding-3-small"

  # ── Screening gates ───────────────────────────────────────────────────────
  MIN_TURNOVER_LAKHS:   "50"
  MIN_PRICE:            "20"
  MAX_PRICE:            "10000"
  MAX_CANDIDATES:       "400"
  APEX_MIN_SCORE:       "48"
  APEX_TOP_N:           "5"

  # ── Phase 2: Dynamic Regime ───────────────────────────────────────────────
  ATR_PERIOD:           "14"
  ATR_MULT_TREND:       "1.5"     # tightest stop in TREND (momentum continuation)
  ATR_MULT_CHOP:        "2.0"     # wider stop in CHOP (mean-reversion noise)
  ATR_MULT_BUNKER:      "2.5"     # widest in BUNKER (VIX > 22)
  VIX_TREND_MAX:        "15"      # VIX < 15 + breadth ok → TREND
  VIX_CHOP_MAX:         "22"      # VIX > 22 → BUNKER

  # ── Phase 3: Order Flow ───────────────────────────────────────────────────
  WHALE_DELIVERY_PCT:   "65"      # delivery% threshold for WHALE_ACCUM flag
  WHALE_VOL_MULT:       "1.5"     # volume spike multiplier vs 20d avg

  # ── Phase 4: Alt-Data ─────────────────────────────────────────────────────
  ALT_DATA_ENABLED:     "true"
  ALT_DATA_MATCH_SIM:   "0.72"    # cosine similarity floor for catalyst match

  # ── Sec 25: Meta-Labeler ─────────────────────────────────────────────────────
  META_MIN_SAMPLES:       "30"    # min closed trades before model activates
  META_VETO_THRESH:       "0.35"  # P(win) < this → meta-labeler veto

  # ── Sec 26: Options Gravity (Max Pain) ─────────────────────────────────────
  MAX_PAIN_ENABLED:            "true"
  MAX_PAIN_CALL_OI_BLOCK_PCT:  "0.005"  # 0.5% proximity to Call OI wall = BLOCKED

  # ── Sec 27: Kelly Criterion ────────────────────────────────────────────────
  KELLY_LOOKBACK:    "20"   # rolling window of closed trades
  KELLY_FRACTION:    "0.5"  # half-Kelly for safety
  KELLY_MIN_MULT:    "0.25" # never size below 25% of ATR base
  KELLY_MAX_MULT:    "2.0"  # never size above 2× ATR base
  KELLY_MIN_TRADES:  "10"   # trades needed to activate Kelly

  # ── Conviction Re-Rank (Option-C, v5.5.2 patch preserved) ─────────────────
  CONVICTION_RERANK:         "true"
  CONV_REQUIRE_CATALYST:     "true"
  CONV_RS_CATALYST_FLOOR:    "85"   # RS pct floor substituting for missing catalyst
  CONV_LANE_FORTRESS_MIN:    "120"
  CONV_LANE_APEX_MIN:        "60"
  CONV_LANE_FUSED_MIN:       "70"

  # ── Capacity ──────────────────────────────────────────────────────────────
  CAPACITY_MAX_OPEN:    "4"
  CAPACITY_MAX_WEEK:    "6"

  # ── Infrastructure ────────────────────────────────────────────────────────
  CACHE_PATH:           "outputs/sniper_cache.db"
  SUPPRESS_HEALTH_ALERTS: "1"

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — EOD Screener (main scoring pipeline)
  # ══════════════════════════════════════════════════════════════════════════
  sniper-run:
    name: "⚔️ Fortress v6.0 EOD Screener"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v6-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-v6-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ML dependencies (meta-labeler)
        run: |
          pip install scikit-learn || echo "⚠️  sklearn unavailable — meta-labeler cold-start mode"

      # Rolling restore — newest sniper-db-* cache
      - name: Restore score cache (ephemeral)
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v6-${{ github.run_id }}
          restore-keys: |
            sniper-db-v6-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Run Fortress v6.0 EOD Screener
        run: |
          if [ "${{ inputs.outcome_only }}" = "true" ]; then
            python sniper_v6_eod.py --outcome-only
          else
            python sniper_v6_eod.py
          fi
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          ACCOUNT_EQUITY:    ${{ secrets.ACCOUNT_EQUITY || '500000' }}
          ACCOUNT_RISK_PCT:  ${{ secrets.ACCOUNT_RISK_PCT || '0.015' }}
          FAST_RERUN:        ${{ inputs.fast_rerun || 'false' }}

      # Rolling save — unique key per run, always writes
      - name: Save score cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v6-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortress-v6-${{ github.run_id }}
          path: outputs/
          retention-days: 14

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Reply Handler (TAKEN/SKIP → direct-to-Sheets, Bug-1 fixed)
  # ══════════════════════════════════════════════════════════════════════════
  reply-handler:
    name: "📱 Reply Handler (direct-to-Sheets)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '*/10 3-10 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v6-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-v6-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore score cache
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v6-${{ github.run_id }}
          restore-keys: |
            sniper-db-v6-

      # Telegram offset — rolling restore so getUpdates never replays stale backlog
      - name: Restore Telegram offset
        uses: actions/cache/restore@v4
        with:
          path: tg_offset.txt
          key: tg-offset-${{ github.run_id }}
          restore-keys: |
            tg-offset-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Poll Telegram
        run: python reply_handler_v5_5.py
        env:
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          CACHE_PATH:            outputs/sniper_cache.db
          REPLY_TIMEOUT_MINUTES: "30"
          GOOGLE_SHEET_ID:       ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON:     ${{ secrets.GOOGLE_CREDS_JSON }}

      - name: Save Telegram offset
        if: always()
        uses: actions/cache/save@v4
        with:
          path: tg_offset.txt
          key: tg-offset-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save score cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v6-${{ github.run_id }}-${{ github.run_attempt }}

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Outcome Engine (EOD resolution, auto-SKIPPED, performance tab)
  # ══════════════════════════════════════════════════════════════════════════
  outcome-engine:
    name: "📊 Outcome Engine (EOD resolution)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1-5') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v6-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-v6-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore score cache
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v6-${{ github.run_id }}
          restore-keys: |
            sniper-db-v6-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Run outcome engine + auto-SKIPPED + performance tab
        run: |
          python - <<'EOF'
          from sniper_v6_eod import (
              _init_db, _get_last_trading_day,
              run_outcome_engine, auto_log_skipped_picks,
              push_performance_to_sheets
          )
          _init_db()
          _, date_label = _get_last_trading_day()
          run_outcome_engine(date_label)
          auto_log_skipped_picks(date_label)
          push_performance_to_sheets(date_label)
          print(f"Outcome complete for {date_label}")
          EOF
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db

      - name: Save score cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v6-${{ github.run_id }}-${{ github.run_attempt }}

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Weekly Review (OpenAI gpt-4o-mini narrative, Monday)
  # ══════════════════════════════════════════════════════════════════════════
  weekly-review:
    name: "📈 Weekly Review (AI narrative)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '45 2 * * 1') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v6-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-v6-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore score cache
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v6-${{ github.run_id }}
          restore-keys: |
            sniper-db-v6-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      - name: Run weekly review
        run: python sniper_v6_eod.py --weekly-review
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db
          FORCE_WEEKLY:      ${{ inputs.force_weekly || 'false' }}

      - name: Save score cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v6-${{ github.run_id }}-${{ github.run_attempt }}
