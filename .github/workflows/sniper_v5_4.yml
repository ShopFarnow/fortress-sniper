name: "UNIFIED HALAL SNIPER v5.4"

on:
  schedule:
    # Job 1: Main sniper engine — 8:30 AM IST = 3:00 AM UTC
    - cron: "0 3 * * 1-5"           # FIX: was "0 0" (midnight UTC = 5:30 AM IST, too late)
    # Job 2: Reply handler poll — every 10 min, 8:30 AM–4 PM IST = 3:00 AM–10:30 AM UTC
    - cron: "*/10 3-10 * * 1-5"
    # Job 3: Outcome engine — 3:30 PM IST = 10:00 AM UTC
    - cron: "0 10 * * 1-5"
    # Job 4: Weekly review — Monday 9:00 AM IST = 3:30 AM UTC
    - cron: "30 3 * * 1"

  workflow_dispatch:
    inputs:
      fast_rerun:
        description: "Fast rerun (use score cache)"
        required: false
        default: "false"
        type: boolean
      force_weekly:
        description: "Force weekly review even if not Monday"
        required: false
        default: "false"
        type: boolean

env:
  NSE_MAX_RETRIES:        "1"
  SUPPRESS_HEALTH_ALERTS: "1"
  FORCE_YFINANCE:         "false"
  REPLY_TIMEOUT_MINUTES:  "30"
  APEX_MIN_SCORE:         "40"
  APEX_TOP_N:             "5"
  CAPACITY_MAX_OPEN:      "4"
  CAPACITY_MAX_WEEK:      "6"
  MC_SIMS:                "600"

jobs:

  # ══════════════════════════════════════════════════════════════════
  # JOB 1 — Main sniper engine
  # ══════════════════════════════════════════════════════════════════
  sniper-run:
    name: "⚔️ Sniper Daily Run"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install survival model dependencies
        run: |
          pip install -r requirements-survival.txt || \
            echo "⚠️  scikit-survival install failed — survival model will run in fallback mode"

      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-persistent

      - name: Run Sniper v5.4
        run: python sniper_unified_v5_4.py
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db
          ACCOUNT_EQUITY:    ${{ secrets.ACCOUNT_EQUITY || '500000' }}
          ACCOUNT_RISK_PCT:  ${{ secrets.ACCOUNT_RISK_PCT || '0.015' }}
          FAST_RERUN:        ${{ inputs.fast_rerun || 'false' }}
          CLAUDE_MODEL:      "claude-sonnet-4-6"

      - name: Save DB
        if: always()
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-persistent

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sniper-report-${{ github.run_id }}
          path: outputs/
          retention-days: 14

      - name: Upload DB as persistent artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sniper-db-latest
          path: outputs/sniper_cache.db
          retention-days: 90

  # ══════════════════════════════════════════════════════════════════
  # JOB 2 — Reply handler
  # FIX: added GOOGLE_SHEET_ID + GOOGLE_CREDS_JSON so the Sheets
  # restore can find today's picks on a fresh runner.
  # ══════════════════════════════════════════════════════════════════
  reply-handler:
    name: "📱 Reply Handler"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '*/10 3-10 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-persistent

      - name: Restore offset
        uses: actions/cache@v4
        with:
          path: tg_offset.txt
          key: tg-offset-persistent

      - name: Poll Telegram
        run: python reply_handler_v5_4.py
        env:
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          CACHE_PATH:            outputs/sniper_cache.db
          REPLY_TIMEOUT_MINUTES: "30"
          # FIX: these two were missing — required for Sheets restore
          # so TAKEN <symbol> works even when DB cache is cold/stale
          GOOGLE_SHEET_ID:       ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON:     ${{ secrets.GOOGLE_CREDS_JSON }}

      - name: Save offset
        if: always()
        uses: actions/cache@v4
        with:
          path: tg_offset.txt
          key: tg-offset-persistent

      - name: Save DB
        if: always()
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-persistent

  # ══════════════════════════════════════════════════════════════════
  # JOB 3 — Outcome engine
  # ══════════════════════════════════════════════════════════════════
  outcome-check:
    name: "📊 Outcome Engine"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1-5') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-persistent

      - name: Run outcome engine
        run: |
          python - <<'EOF'
          from sniper_unified_v5_4 import _init_db, _run_outcome_engine, _auto_log_skipped_picks, _get_last_trading_day
          _init_db()
          _, date_label = _get_last_trading_day()
          _run_outcome_engine()
          _auto_log_skipped_picks(date_label)
          print(f"Outcome complete for {date_label}")
          EOF
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db

      - name: Save DB
        if: always()
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-persistent

  # ══════════════════════════════════════════════════════════════════
  # JOB 4 — Weekly review
  # ══════════════════════════════════════════════════════════════════
  weekly-review:
    name: "📈 Weekly Review"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 3 * * 1') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-persistent

      - name: Run weekly review
        run: python sniper_unified_v5_4.py --weekly-review
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db
          FORCE_WEEKLY:      ${{ inputs.force_weekly || 'false' }}

      - name: Save DB
        if: always()
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-persistent
