name: Sniper Screen — Fortress + APEX → Telegram

on:
  schedule:
    - cron: '30 3 * * 1-5'   # 9:00 AM IST
    - cron: '0 10 * * 1-5'    # 3:30 PM IST
  workflow_dispatch:

jobs:
  fortress:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fortress Screener v8
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SHARE_IDS: ${{ secrets.TELEGRAM_SHARE_IDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          PAPER_MODE: ${{ secrets.PAPER_MODE || 'false' }}
        run: |
          mkdir -p outputs
          python screener_v8.py

      - name: Upload Fortress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortress-outputs
          path: |
            outputs/
            *.db

  apex:
    needs: fortress  # runs AFTER Fortress completes successfully
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run APEX Sniper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SHARE_IDS: ${{ secrets.TELEGRAM_SHARE_IDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          ACCOUNT_EQUITY: ${{ secrets.ACCOUNT_EQUITY || '500000' }}
          ACCOUNT_RISK_PCT: ${{ secrets.ACCOUNT_RISK_PCT || '0.015' }}
          APEX_TOP_N: ${{ secrets.APEX_TOP_N || '5' }}
          APEX_MIN_SCORE: ${{ secrets.APEX_MIN_SCORE || '48' }}
          PAPER_MODE: ${{ secrets.PAPER_MODE || 'false' }}
          FORCE_YFINANCE: ${{ secrets.FORCE_YFINANCE || 'false' }}
          GOOGLE_FINANCE_ENABLED: ${{ secrets.GOOGLE_FINANCE_ENABLED || 'false' }}
          NSEPYTHON_ENABLED: ${{ secrets.NSEPYTHON_ENABLED || 'false' }}
        run: |
          mkdir -p outputs
          python apex_sniper.py

      - name: Upload APEX artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-outputs
          path: |
            outputs/
            *.db
