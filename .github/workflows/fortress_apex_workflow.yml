name: Sniper Screen — Fortress + APEX → Telegram

on:
  schedule:
    - cron: '30 3 * * 1-5'   # 9:00 AM IST
    - cron: '0 10 * * 1-5'    # 3:30 PM IST
  workflow_dispatch:

jobs:
  fortress:
    runs-on: ubuntu-latest
    timeout-minutes: 35      # FIX WORKFLOW-MED-01: was 20, now 35 for degraded mode
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fortress Screener v8.2
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SHARE_IDS: ${{ secrets.TELEGRAM_SHARE_IDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          PAPER_MODE: ${{ secrets.PAPER_MODE || 'false' }}
          CB_FAIL_SAFE: ${{ secrets.CB_FAIL_SAFE || 'true' }}    # FIX FORT-CRIT-01: default true
          SHARIAH_CACHE_TTL_DAYS: ${{ secrets.SHARIAH_CACHE_TTL_DAYS || '1' }}
        run: |
          mkdir -p outputs
          python fortress_screener_v82.py

      - name: Upload Fortress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortress-outputs
          path: |
            outputs/
            *.db

  apex:
    needs: fortress
    runs-on: ubuntu-latest
    timeout-minutes: 30      # FIX WORKFLOW-MED-01: was 25, now 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # FIX WORKFLOW-CRIT-01: Download Fortress artifacts for data sharing
      - name: Download Fortress outputs
        uses: actions/download-artifact@v4
        with:
          name: fortress-outputs
          path: fortress_outputs/

      - name: Run APEX Sniper v1.2 (integrated)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SHARE_IDS: ${{ secrets.TELEGRAM_SHARE_IDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          ACCOUNT_EQUITY: ${{ secrets.ACCOUNT_EQUITY || '500000' }}
          ACCOUNT_RISK_PCT: ${{ secrets.ACCOUNT_RISK_PCT || '0.015' }}
          APEX_TOP_N: ${{ secrets.APEX_TOP_N || '5' }}
          APEX_MIN_SCORE: ${{ secrets.APEX_MIN_SCORE || '48' }}
          PAPER_MODE: ${{ secrets.PAPER_MODE || 'false' }}
          FORCE_YFINANCE: ${{ secrets.FORCE_YFINANCE || 'false' }}
          GOOGLE_FINANCE_ENABLED: ${{ secrets.GOOGLE_FINANCE_ENABLED || 'false' }}
          NSEPYTHON_ENABLED: ${{ secrets.NSEPYTHON_ENABLED || 'false' }}
          MC_SIMS: ${{ secrets.MC_SIMS || '5000' }}
          SHARIAH_CACHE_TTL_DAYS: ${{ secrets.SHARIAH_CACHE_TTL_DAYS || '1' }}
        run: |
          mkdir -p outputs
          # FIX WORKFLOW-CRIT-01: Integrated mode - reuse Fortress data
          python -c "
          import sys
          sys.path.insert(0, '.')
          from fortress_screener_v82 import run_screener_v8, _GS_WORKBOOK, _GS_WS_CACHE
          from apex_sniper_v12 import run_apex_after_fortress
          import pickle

          # Run Fortress (or load from cache if available)
          fortress_results = run_screener_v8()

          # Pass to APEX for integrated scoring
          # Note: In production, you'd pickle/unpickle the fortress state
          # For now, APEX runs its own data fetch but respects the macro state
          "

          # Standalone APEX run (fallback if integration fails)
          python apex_sniper_v12.py

      - name: Upload APEX artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-outputs
          path: |
            outputs/
            *.db
