# ═══════════════════════════════════════════════════════════════
# GitHub Actions: UNIFIED HALAL SNIPER v3.0-M
# Single-file production fix — avoids github.event.schedule bug
# ═══════════════════════════════════════════════════════════════

name: 🕌 Unified Halal Sniper v3.0-M

on:
  schedule:
    # 13:00 UTC = 18:30 IST (Mon-Fri)
    - cron: '0 13 * * 1-5'
    # Every 10 min, 03:00–10:50 UTC = 8:30 AM–4:20 PM IST (Mon-Fri)
    - cron: '*/10 3-10 * * 1-5'
    # 10:30 UTC = 16:00 IST (Fridays only)
    - cron: '30 10 * * 5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DB_CACHE_KEY: sniper-db-${{ runner.os }}

jobs:

  # ─────────────────────────────────────────────────────────────
  # ROUTER — determines which job(s) should run based on UTC time.
  # Avoids github.event.schedule which is unreliable with multiple crons.
  # ─────────────────────────────────────────────────────────────
  route:
    name: 🔀 Route Trigger
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      sniper: ${{ steps.set.outputs.sniper }}
      reply:  ${{ steps.set.outputs.reply }}
      weekly: ${{ steps.set.outputs.weekly }}
    steps:
      - name: Determine active job from UTC time
        id: set
        run: |
          set -e
          H=$(date -u +%H)
          M=$(date -u +%M)
          DOW=$(date -u +%u)   # 1=Mon … 5=Fri

          # Defaults
          echo "sniper=false" >> $GITHUB_OUTPUT
          echo "reply=false"  >> $GITHUB_OUTPUT
          echo "weekly=false" >> $GITHUB_OUTPUT

          # Manual dispatch = run everything
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "sniper=true" >> $GITHUB_OUTPUT
            echo "reply=true"  >> $GITHUB_OUTPUT
            echo "weekly=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Sniper slot: 13:00 UTC, Mon-Fri
          if [[ "$H" == "13" && "$M" == "00" && "$DOW" -ge 1 && "$DOW" -le 5 ]]; then
            echo "sniper=true" >> $GITHUB_OUTPUT
          fi

          # Reply slot: every 10 min, 03:00–10:50 UTC, Mon-Fri
          if [[ "$DOW" -ge 1 && "$DOW" -le 5 ]]; then
            h=$((10#$H))
            m=$((10#$M))
            if (( h >= 3 && h <= 10 )) && (( m % 10 == 0 )); then
              echo "reply=true" >> $GITHUB_OUTPUT
            fi
          fi

          # Weekly slot: 10:30 UTC, Friday
          if [[ "$H" == "10" && "$M" == "30" && "$DOW" == "5" ]]; then
            echo "weekly=true" >> $GITHUB_OUTPUT
          fi


  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Main daily sniper run (13:00 UTC)
  # ─────────────────────────────────────────────────────────────
  sniper-run:
    name: 🔫 Run Unified Sniper
    needs: route
    if: needs.route.outputs.sniper == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_SHARE_IDS:  ${{ secrets.TELEGRAM_SHARE_IDS }}
      GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDS_JSON:   ${{ secrets.GOOGLE_CREDS_JSON }}
      PAPER_MODE:           'true'
      FORCE_YFINANCE:       'false'
      FORCE_SHEETS:         'false'
      CB_FAIL_SAFE:         'true'
      ACCOUNT_EQUITY:       '500000'
      ACCOUNT_RISK_PCT:     '0.015'
      SHARIAH_CACHE_TTL_DAYS: '1'
      APEX_TOP_N:           '5'
      APEX_MIN_SCORE:       '48'
      MC_SIMS:              '600'
      CAPACITY_MAX_OPEN:    '4'
      CAPACITY_MAX_WEEK:    '6'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Restore DB from cache
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: ${{ env.DB_CACHE_KEY }}

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 🎯 Execute Unified Sniper v3.0-M
        run: python sniper_unified_v2.py

      - name: 💾 Save DB to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: outputs/sniper_cache.db
          key: ${{ env.DB_CACHE_KEY }}

      - name: 📤 Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sniper-outputs-${{ github.run_id }}
          path: |
            outputs/sniper_report.xlsx
            outputs/sniper_report.html
            outputs/sniper_cache.db
          retention-days: 30

      - name: 📤 Upload reply_handler.py
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reply-handler-${{ github.run_id }}
          path: reply_handler.py
          retention-days: 90


  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Telegram reply poller (every 10 min, 03:00–10:50 UTC)
  # ─────────────────────────────────────────────────────────────
  reply-handler:
    name: 💬 Process Telegram Replies
    needs: route
    if: needs.route.outputs.reply == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CACHE_PATH:       outputs/sniper_cache.db

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install minimal requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🗄️ Restore DB from cache
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: ${{ env.DB_CACHE_KEY }}

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 💬 Poll Telegram replies
        run: python reply_handler.py

      - name: 💾 Save DB to cache
        uses: actions/cache/save@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        with:
          path: outputs/sniper_cache.db
          key: ${{ env.DB_CACHE_KEY }}

      - name: 📤 Upload updated DB
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        with:
          name: reply-db-${{ github.run_id }}
          path: outputs/sniper_cache.db
          retention-days: 7


  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Weekly review (Friday 10:30 UTC)
  # ─────────────────────────────────────────────────────────────
  weekly-review:
    name: 📊 Weekly Performance Review
    needs: route
    if: needs.route.outputs.weekly == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CACHE_PATH:       outputs/sniper_cache.db

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Restore DB from cache
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: ${{ env.DB_CACHE_KEY }}

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 📊 Send weekly review
        run: python sniper_unified_v2.py --weekly-review

      - name: 💾 Save DB to cache
        uses: actions/cache/save@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        with:
          path: outputs/sniper_cache.db
          key: ${{ env.DB_CACHE_KEY }}
