# ═══════════════════════════════════════════════════════════════════════
# GitHub Actions: UNIFIED HALAL SNIPER v4.0-M
#
# WHAT CHANGED vs v3.0-M:
#
# FLOW-1  Steps 1-3 run without halal filter (Bhavcopy → Fortress → APEX).
#         Step 4 Halal AI Screen runs post-APEX on top-N candidates only.
#         This is all inside sniper_unified_v2.py — no YML change needed.
#
# FLOW-2  Multi-provider LLM secrets added:
#         ANTHROPIC_API_KEY  → Claude Sonnet (signal coherence + halal screen)
#         OPENAI_API_KEY     → GPT-4o mini (filing sentiment) + GPT-4o (weekly/sandbox)
#         Both are optional. Add only the keys you've enabled this month.
#
# FLOW-3  No-response = SKIPPED. reply_handler no longer has a SKIPPED path.
#         sniper_unified_v2.py auto-logs silence at EOD (_auto_log_skipped_picks).
#         The reply-handler schedule is kept for TAKEN/PARTIAL polling only.
#
# FLOW-4  sandbox-proposals job added (manual trigger only).
#         Step 11: generates parameter proposals, saves to strategy_sandbox.
#         NO auto-approve. Human reviews SQL table and approves.
#
# FLOW-5  Weekly review now calls --weekly-review which routes to
#         _weekly_ai_status_agent() (LLM analysis if key present,
#         rule-based fallback if not).
#
# CACHE-FIX [GH-001] retained: scoped keys per job.
# ═══════════════════════════════════════════════════════════════════════

name: 🕌 Unified Halal Sniper v4.0-M

on:
  schedule:
    - cron: '0 13 * * 1-5'          # 18:30 IST Mon-Fri  → daily sniper run
    - cron: '*/10 3-10 * * 1-5'     # every 10 min, 8:30 AM–4:20 PM IST → reply poll
    - cron: '30 10 * * 5'           # 16:00 IST Friday   → weekly review
  workflow_dispatch:
    inputs:
      run_sandbox:
        description: 'Run sandbox parameter proposals (Step 11)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────────────────────────
  # ROUTER — reads UTC clock, avoids github.event.schedule race condition
  # ─────────────────────────────────────────────────────────────────────
  route:
    name: 🔀 Route Trigger
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      sniper:    ${{ steps.set.outputs.sniper }}
      reply:     ${{ steps.set.outputs.reply }}
      weekly:    ${{ steps.set.outputs.weekly }}
      sandbox:   ${{ steps.set.outputs.sandbox }}
    steps:
      - name: Determine active job from UTC time
        id: set
        run: |
          set -e
          H=$(date -u +%H)
          M=$(date -u +%M)
          DOW=$(date -u +%u)   # 1=Mon … 5=Fri

          echo "sniper=false"  >> $GITHUB_OUTPUT
          echo "reply=false"   >> $GITHUB_OUTPUT
          echo "weekly=false"  >> $GITHUB_OUTPUT
          echo "sandbox=false" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "sniper=true"  >> $GITHUB_OUTPUT
            echo "reply=true"   >> $GITHUB_OUTPUT
            echo "weekly=true"  >> $GITHUB_OUTPUT
            # FLOW-4: sandbox only runs when explicitly requested
            if [[ "${{ github.event.inputs.run_sandbox }}" == "true" ]]; then
              echo "sandbox=true" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Daily sniper at 18:30 IST = 13:00 UTC
          if [[ "$H" == "13" && "$M" == "00" && "$DOW" -ge 1 && "$DOW" -le 5 ]]; then
            echo "sniper=true" >> $GITHUB_OUTPUT
          fi

          # Reply poll: 8:30 AM – 4:20 PM IST = 3:00–10:20 UTC, every 10 min
          # FLOW-3: kept for TAKEN/PARTIAL only (no SKIPPED polling needed)
          if [[ "$DOW" -ge 1 && "$DOW" -le 5 ]]; then
            h=$((10#$H))
            m=$((10#$M))
            if (( h >= 3 && h <= 10 )) && (( m % 10 == 0 )); then
              echo "reply=true" >> $GITHUB_OUTPUT
            fi
          fi

          # Weekly review: Friday 16:00 IST = 10:30 UTC
          if [[ "$H" == "10" && "$M" == "30" && "$DOW" == "5" ]]; then
            echo "weekly=true" >> $GITHUB_OUTPUT
          fi


  # ─────────────────────────────────────────────────────────────────────
  # JOB 1 — Daily sniper run (Steps 1-7 of the flow)
  # ─────────────────────────────────────────────────────────────────────
  sniper-run:
    name: 🔫 Run Unified Sniper v4.0-M
    needs: route
    if: needs.route.outputs.sniper == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # ── Telegram
      TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_SHARE_IDS:  ${{ secrets.TELEGRAM_SHARE_IDS }}
      # ── Google Sheets
      GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDS_JSON:   ${{ secrets.GOOGLE_CREDS_JSON }}
      # ── FLOW-2: Multi-provider LLM keys (both optional)
      # Patch in the key for each task you've enabled this month.
      # Claude Sonnet  → signal coherence + halal screen (₹66+₹99/month)
      ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_MODEL:        'claude-sonnet-4-20250514'
      # GPT-4o mini    → filing sentiment (₹2/month)
      OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MINI_MODEL:   'gpt-4o-mini'
      OPENAI_BATCH_MODEL:  'gpt-4o'
      # ── Pipeline config
      PAPER_MODE:           'true'
      FORCE_YFINANCE:       'false'
      FORCE_SHEETS:         'false'
      CB_FAIL_SAFE:         'true'
      ACCOUNT_EQUITY:       '500000'
      ACCOUNT_RISK_PCT:     '0.015'
      SHARIAH_CACHE_TTL_DAYS: '1'
      # ── Step 4: Halal AI TTL (7 days — financials don't change weekly)
      HALAL_AI_TTL_DAYS:    '7'
      # ── Step 5: Calibrated AI Judge thresholds
      APEX_TOP_N:           '5'
      APEX_MIN_SCORE:       '48'
      # ── APEX config
      MC_SIMS:              '600'
      CAPACITY_MAX_OPEN:    '4'
      CAPACITY_MAX_WEEK:    '6'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # CACHE-FIX [GH-001]: scoped key prevents collision
      - name: 🗄️ Restore DB from cache
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-main-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sniper-db-main-
            sniper-db-reply-
            sniper-db-weekly-
            sniper-db-sandbox-
            sniper-db-

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 🎯 Execute Unified Sniper v4.0-M
        # Steps 1-7: Bhavcopy → Fortress → APEX → Halal AI → Calibrated Judge
        #            → Telegram → Save DB
        run: python sniper_unified_v2.py

      - name: 💾 Save DB to cache
        uses: actions/cache/save@v4
        if: always()
        continue-on-error: true
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-main-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 📤 Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sniper-outputs-${{ github.run_id }}
          path: |
            outputs/sniper_report.xlsx
            outputs/sniper_report.html
            outputs/sniper_cache.db
          retention-days: 30

      - name: 📤 Upload reply_handler.py
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reply-handler-${{ github.run_id }}
          path: reply_handler.py
          retention-days: 90


  # ─────────────────────────────────────────────────────────────────────
  # JOB 2 — Telegram reply poller (Step 8 — TAKEN / PARTIAL only)
  # FLOW-3: No SKIPPED polling. Silence auto-logged at EOD by sniper.
  # ─────────────────────────────────────────────────────────────────────
  reply-handler:
    name: 💬 Process Telegram Replies (TAKEN/PARTIAL)
    needs: route
    if: needs.route.outputs.reply == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CACHE_PATH:       outputs/sniper_cache.db

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install minimal requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # CACHE-FIX [GH-001]: reply-handler gets its own scoped key
      - name: 🗄️ Restore DB from cache
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-reply-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sniper-db-reply-
            sniper-db-main-
            sniper-db-weekly-
            sniper-db-sandbox-
            sniper-db-

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 💬 Poll Telegram replies (TAKEN / PARTIAL only)
        # FLOW-3: reply_handler.py no longer handles SKIPPED.
        # Users get a redirect message if they send SKIPPED.
        run: python reply_handler.py

      - name: 💾 Save DB to cache
        uses: actions/cache/save@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        continue-on-error: true
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-reply-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 📤 Upload updated DB
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        with:
          name: reply-db-${{ github.run_id }}
          path: outputs/sniper_cache.db
          retention-days: 7


  # ─────────────────────────────────────────────────────────────────────
  # JOB 3 — Weekly review (Step 10 — LLM status agent, read-only)
  # FLOW-5: Routes to _weekly_ai_status_agent() in sniper_unified_v2.py.
  #         Falls back to rule-based summary if no LLM key present.
  # ─────────────────────────────────────────────────────────────────────
  weekly-review:
    name: 📊 Weekly AI Status Report (Step 10)
    needs: route
    if: needs.route.outputs.weekly == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
      CACHE_PATH:        outputs/sniper_cache.db
      # FLOW-2: LLM keys for AI analysis
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BATCH_MODEL: 'gpt-4o'
      CLAUDE_MODEL:       'claude-sonnet-4-20250514'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # CACHE-FIX [GH-001]: weekly gets its own scoped key
      - name: 🗄️ Restore DB from cache
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-weekly-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sniper-db-weekly-
            sniper-db-main-
            sniper-db-reply-
            sniper-db-sandbox-
            sniper-db-

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 📊 Send weekly AI status report
        # FLOW-5: --weekly-review now routes to _weekly_ai_status_agent()
        # Read-only: never mutates DB or parameters.
        run: python sniper_unified_v2.py --weekly-review

      - name: 💾 Save DB to cache
        uses: actions/cache/save@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        continue-on-error: true
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-weekly-${{ github.run_id }}-${{ github.run_attempt }}


  # ─────────────────────────────────────────────────────────────────────
  # JOB 4 — Sandbox parameter proposals (Step 11 — manual trigger only)
  # FLOW-4: workflow_dispatch with run_sandbox=true, OR after 90 days data.
  # NO AUTO-APPROVE. Human reviews strategy_sandbox table and approves.
  # ─────────────────────────────────────────────────────────────────────
  sandbox-proposals:
    name: 🔬 Sandbox Parameter Proposals (Step 11)
    needs: route
    if: needs.route.outputs.sandbox == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
      CACHE_PATH:        outputs/sniper_cache.db
      # FLOW-2: LLM keys — sandbox uses GPT-4o (batch)
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BATCH_MODEL: 'gpt-4o'
      CLAUDE_MODEL:       'claude-sonnet-4-20250514'
      # Pipeline params for baseline comparison
      APEX_MIN_SCORE:    '48'
      APEX_TOP_N:        '5'
      CAPACITY_MAX_OPEN: '4'
      CAPACITY_MAX_WEEK: '6'
      MC_SIMS:           '600'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # CACHE-FIX [GH-001]: sandbox gets its own scoped key
      - name: 🗄️ Restore DB from cache
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-sandbox-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sniper-db-sandbox-
            sniper-db-main-
            sniper-db-weekly-
            sniper-db-reply-
            sniper-db-

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 🔬 Generate sandbox proposals
        # FLOW-4: Proposals saved to strategy_sandbox table (status=PROPOSED).
        # NO automatic parameter changes. Human reviews + approves.
        # Requires: ≥90 days data + ≥30 closed trades (checked inside script).
        run: python sniper_unified_v2.py --sandbox-proposals

      - name: 💾 Save DB to cache
        uses: actions/cache/save@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        continue-on-error: true
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-sandbox-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 📤 Upload sandbox DB
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        with:
          name: sandbox-db-${{ github.run_id }}
          path: outputs/sniper_cache.db
          retention-days: 30
