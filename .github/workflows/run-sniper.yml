# ═══════════════════════════════════════════════════════════════
# GitHub Actions: UNIFIED HALAL SNIPER v3.0-M
# Bismillah — In the name of Allah, the Most Gracious, the Most Merciful
#
# Jobs:
#   1. sniper-run        — daily EOD scan (Mon-Fri 6:30 PM IST)
#   2. reply-handler     — Telegram reply poller (every 10 min, market hours)
#   3. weekly-review     — Friday performance summary (4 PM IST)
# ═══════════════════════════════════════════════════════════════

name: 🕌 Unified Halal Sniper v3.0-M

on:
  schedule:
    # 13:00 UTC = 18:30 IST (Mon-Fri after market close)
    - cron: '0 13 * * 1-5'
    # 3:00 UTC = 8:30 IST (Mon-Fri pre-market, reply poller start)
    - cron: '0 3 * * 1-5'
    # 10:30 UTC = 16:00 IST (Friday weekly review)
    - cron: '30 10 * * 5'
  workflow_dispatch:      # manual trigger, no inputs

env:
  # Suppress Node.js 20 deprecation warnings — force Node 24 runtime
  # Remove after GitHub completes migration (expected before Sept 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Main daily sniper run
  # ─────────────────────────────────────────────────────────────
  sniper-run:
    name: 🔫 Run Unified Sniper
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # ── Secrets ──
      TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_SHARE_IDS:  ${{ secrets.TELEGRAM_SHARE_IDS }}
      GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDS_JSON:   ${{ secrets.GOOGLE_CREDS_JSON }}
      # ── Config ──
      PAPER_MODE:           'true'
      FORCE_YFINANCE:       'false'
      FORCE_SHEETS:         'false'
      CB_FAIL_SAFE:         'true'
      ACCOUNT_EQUITY:       '500000'
      ACCOUNT_RISK_PCT:     '0.015'
      SHARIAH_CACHE_TTL_DAYS: '1'
      APEX_TOP_N:           '5'
      APEX_MIN_SCORE:       '48'
      MC_SIMS:              '600'
      # ── v3.0-M Capacity guard ──
      CAPACITY_MAX_OPEN:    '4'
      CAPACITY_MAX_WEEK:    '6'

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ──────────────────────────────
      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Restore DB cache ──────────────────────────────────
      - name: 🗄️ Restore DB from cache
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            sniper-db-${{ runner.os }}-

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      # ── 5. Run the sniper ────────────────────────────────────
      - name: 🎯 Execute Unified Sniper v3.0-M
        run: python sniper_unified_v2.py

      # ── 6. Upload artifacts ─────────────────────────────────
      - name: 📤 Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sniper-outputs-${{ github.run_id }}
          path: |
            outputs/sniper_report.xlsx
            outputs/sniper_report.html
            outputs/sniper_cache.db
          retention-days: 30

      # ── 7. Upload reply_handler.py ───────────────────────────
      - name: 📤 Upload reply_handler
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reply-handler-${{ github.run_id }}
          path: reply_handler.py
          retention-days: 90


  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Telegram reply poller (v3.0-M decision logging)
  # Polls every 10 min on weekdays during market hours (8:30 AM - 4 PM IST)
  # ─────────────────────────────────────────────────────────────
  reply-handler:
    name: 💬 Process Telegram Replies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Separate schedule — run on cron independently
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    env:
      TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CACHE_PATH:       outputs/sniper_cache.db

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install minimal requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🗄️ Restore DB from cache
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            sniper-db-${{ runner.os }}-

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 💬 Poll Telegram replies
        run: python reply_handler.py

      # ── FIXED: Conditional DB upload — only if DB exists ─────
      - name: 📤 Upload updated DB
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('outputs/sniper_cache.db') != ''
        with:
          name: reply-db-${{ github.run_id }}
          path: outputs/sniper_cache.db
          retention-days: 7


  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Weekly review (Fridays 4 PM IST = 10:30 UTC)
  # ─────────────────────────────────────────────────────────────
  weekly-review:
    name: 📊 Weekly Performance Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on Friday cron or manual trigger
    if: (github.event_name == 'schedule' && github.event.schedule == '30 10 * * 5') || github.event_name == 'workflow_dispatch'

    env:
      TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CACHE_PATH:       outputs/sniper_cache.db

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Restore DB from cache
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            sniper-db-${{ runner.os }}-

      - name: 📂 Ensure outputs dir
        run: mkdir -p outputs

      - name: 📊 Send weekly review
        run: python sniper_unified_v2.py --weekly-review
