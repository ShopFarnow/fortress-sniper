name: IPO Sniper v11.0

on:
  schedule:
    # 00:00 UTC = 05:30 AM IST
    - cron: '0 0 * * *'  
  workflow_dispatch:

jobs:
  ipo-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ipo-v11-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-ipo-v11-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data
          key: sniper-db-ipo-v11-${{ github.run_id }}
          restore-keys: sniper-db-ipo-v11-

      - name: Run IPO Sniper v11.0
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ipo_sniper_v11.py

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipo-sniper-v11-db
          path: data/
          retention-days: 30
