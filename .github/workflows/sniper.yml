name: Fortress Sniper

on:
  schedule:
    - cron: "0 3 * * 1-5"        # Sniper main run — 8:30 AM IST weekdays
    - cron: "*/10 3-10 * * 1-5"  # Reply handler — every 10 min, 8:30 AM–4 PM IST weekdays
  workflow_dispatch:               # Manual trigger button on GitHub Actions tab

jobs:

  # ── JOB 1: Main sniper engine — runs once daily at market open ─────────────
  sniper-run:
    name: Sniper Daily Run
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1-5')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB from previous run
        uses: actions/cache@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-${{ github.run_id }}
          restore-keys: sniper-db-

      - name: Run Sniper
        run: python sniper_unified.py
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          CACHE_PATH:        outputs/sniper_cache.db

  # ── JOB 2: Telegram reply poller — runs every 10 min during market hours ───
  reply-handler:
    name: Reply Handler Poll
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '*/10 3-10 * * 1-5')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB + offset file
        uses: actions/cache@v4
        with:
          path: |
            outputs/sniper_cache.db
            outputs/tg_offset.txt
          key: reply-state-${{ github.run_id }}
          restore-keys: reply-state-

      - name: Poll Telegram replies
        run: python reply_handler.py
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CACHE_PATH:       outputs/sniper_cache.db
