name: IPO Sniper v4.0

on:
  schedule:
    - cron: '30 4 * * *'   # daily 10:00 AM IST
  workflow_dispatch:

jobs:
  ipo-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ipo-v4-${{ hashFiles('requirements-v4.txt') }}
          restore-keys: ${{ runner.os }}-pip-ipo-v4-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-v4.txt
          playwright install --with-deps chromium

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data
          key: sniper-db-ipo-v4-${{ github.run_id }}
          restore-keys: sniper-db-ipo-v4-

      - name: Run IPO Sniper v4
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ipo_scanner_v4.py

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipo-sniper-v4-db
          path: data/ipo_sniper_v4.db
          retention-days: 7
