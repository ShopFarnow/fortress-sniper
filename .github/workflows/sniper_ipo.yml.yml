name: SME IPO Snapshot

on:
  schedule:
    # Run daily at 10:00 AM IST (4:30 UTC)
    - cron: '30 4 * * *'
  workflow_dispatch:   # allow manual trigger

jobs:
  ipo-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ipo-${{ hashFiles('requirements-ipo.txt') }}
          restore-keys: ${{ runner.os }}-pip-ipo-

      - name: Install dependencies
        run: |
          pip install -r requirements-ipo.txt
          # Also install sentence-transformers if not present (optional for RAG, but we keep minimal)
          pip install sentence-transformers>=2.2.2

      - name: Restore DB cache (halal cache & IPO DB)
        uses: actions/cache@v4
        with:
          path: outputs
          key: sniper-db-ipo-${{ github.run_id }}
          restore-keys: sniper-db-ipo-

      - name: Run IPO Screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          # IPO specific (optional)
          IPO_FALLBACK_CSV: data/ipo_fallback.csv
        run: python ipo_scanner.py

      - name: Upload IPO DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipo-db
          path: outputs/ipo_cache.db
          retention-days: 7
